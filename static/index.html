<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAVEN Condition Parser</title>
  <meta name="description" content="RAVEN rule-parser playground — parse, visualise, and classify logical conditions in real time." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Tokens ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #070d1a;
      --surface:   #0d1829;
      --surface2:  #111f35;
      --border:    #1c3050;
      --accent:    #3b82f6;
      --accent2:   #6366f1;
      --green:     #22c55e;
      --red:       #ef4444;
      --amber:     #f59e0b;
      --text:      #e2eaf5;
      --muted:     #647da0;
      --radius:    12px;
      --shadow:    0 8px 32px rgba(0,0,0,.5);
      /* token colours */
      --tok-field:    #60a5fa;
      --tok-op:       #a78bfa;
      --tok-num:      #34d399;
      --tok-str:      #fbbf24;
      --tok-logical:  #f472b6;
      --tok-paren:    #94a3b8;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, #1e3a5f55 0%, transparent 70%),
        radial-gradient(ellipse 50% 30% at 90% 80%,  #3b1f6a33 0%, transparent 60%);
    }

    /* ─── Layout ──────────────────────────────────────────────── */
    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .logo {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: #fff;
      box-shadow: 0 0 24px #3b82f640;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -.5px; }
    header span { color: var(--muted); font-size: .85rem; margin-left: 4px; }

    /* ─── Card ────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .card-title {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    /* ─── Input section ───────────────────────────────────────── */
    .input-row { display: flex; gap: 10px; align-items: flex-start; }

    textarea#cond {
      flex: 1;
      min-height: 90px;
      background: var(--surface2);
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: .9rem;
      resize: vertical;
      transition: border-color .2s;
      outline: none;
    }
    textarea#cond:focus { border-color: var(--accent); }

    .btn {
      padding: 10px 22px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 18px #3b82f630;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-ghost {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }

    /* ─── Error banner ────────────────────────────────────────── */
    #error-bar {
      display: none;
      background: linear-gradient(90deg, #7f1d1d66, #7f1d1d11);
      border: 1px solid #ef444455;
      border-radius: 8px;
      padding: 10px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: .82rem;
      color: #fca5a5;
      margin-top: 10px;
      animation: fadeIn .2s ease;
    }

    /* ─── Token chips ─────────────────────────────────────────── */
    #token-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 34px;
    }
    .chip {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      padding: 4px 10px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      font-weight: 500;
      transition: transform .15s;
      cursor: default;
      user-select: none;
    }
    .chip:hover { transform: translateY(-2px); }
    .chip .chip-label {
      font-size: .6rem;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      letter-spacing: .8px;
      opacity: .65;
      margin-bottom: 1px;
    }
    .chip-FIELD    { background: #1e3a5f; color: var(--tok-field);   border: 1px solid #60a5fa33; }
    .chip-OPERATOR { background: #2d1f5e; color: var(--tok-op);      border: 1px solid #a78bfa33; }
    .chip-VALUE_NUM{ background: #064e3b; color: var(--tok-num);     border: 1px solid #34d39933; }
    .chip-VALUE_STR{ background: #451a03; color: var(--tok-str);     border: 1px solid #fbbf2433; }
    .chip-LOGICAL  { background: #500724; color: var(--tok-logical);  border: 1px solid #f472b633; }
    .chip-LPAREN, .chip-RPAREN, .chip-COMMA {
      background: #1e293b; color: var(--tok-paren); border: 1px solid #94a3b822;
    }

    /* ─── Main grid ───────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

    /* ─── JSON output ─────────────────────────────────────────── */
    #json-out {
      background: var(--surface2);
      border-radius: 8px;
      padding: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem;
      line-height: 1.7;
      overflow: auto;
      max-height: 340px;
      min-height: 120px;
      white-space: pre;
    }
    /* Syntax colouring for JSON */
    .j-key    { color: #93c5fd; }
    .j-str    { color: #fbbf24; }
    .j-num    { color: #34d399; }
    .j-bool   { color: #f472b6; }
    .j-null   { color: #94a3b8; }

    /* ─── Operator classifier ─────────────────────────────────── */
    .op-row { display: flex; gap: 8px; margin-bottom: 14px; }
    #op-input {
      flex: 1;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 9px 13px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: .87rem;
      outline: none;
      transition: border-color .2s;
    }
    #op-input:focus { border-color: var(--accent2); }

    #op-result { display: none; animation: fadeIn .2s ease; }
    .pred-label {
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .pred-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--accent2);
      margin-bottom: 10px;
    }
    .conf-bar-wrap {
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .conf-bar {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: width .4s ease;
    }
    .conf-pct {
      font-size: .7rem;
      color: var(--muted);
      margin-top: 5px;
      text-align: right;
    }

    /* ─── Autocomplete suggestions ───────────────────────────── */
    #ac-box {
      display: none;
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .ac-tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: .75rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .ac-tag:hover { border-color: var(--accent); color: var(--text); }

    /* ─── Stats row ───────────────────────────────────────────── */
    .stats {
      display: flex;
      gap: 20px;
      margin-top: 6px;
    }
    .stat {
      font-size: .72rem;
      color: var(--muted);
    }
    .stat b { color: var(--text); font-weight: 600; }

    /* ─── Animations ──────────────────────────────────────────── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .animate-in { animation: fadeIn .25s ease; }

    /* ─── Scrollbar ───────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ─── Empty state ─────────────────────────────────────────── */
    .empty { color: var(--muted); font-size: .8rem; font-style: italic; padding: 8px 0; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">R</div>
    <div>
      <h1>RAVEN <span>Condition Parser</span></h1>
    </div>
  </header>

  <!-- Input card -->
  <div class="card" style="margin-bottom:16px">
    <div class="card-title"><span class="dot"></span>Condition Input</div>
    <div class="input-row">
      <textarea id="cond" spellcheck="false" placeholder="e.g.  accountBalance > 1000 and (status = active or role = admin)">accountBalance = 1000 and (gender = female and status = active)</textarea>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button id="parse-btn" class="btn btn-primary" onclick="runParse()">Parse →</button>
        <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
      </div>
    </div>
    <div id="error-bar"></div>
    <div class="stats" id="stats" style="display:none">
      <span class="stat">Tokens: <b id="stat-tokens">—</b></span>
      <span class="stat">Depth: <b id="stat-depth">—</b></span>
    </div>
  </div>

  <!-- Token strip -->
  <div class="card" style="margin-bottom:16px">
    <div class="card-title"><span class="dot" style="background:var(--tok-logical)"></span>Token Stream</div>
    <div id="token-strip"><span class="empty">Tokens will appear here after parsing…</span></div>
  </div>

  <!-- Main grid: AST + Classifier -->
  <div class="grid">

    <!-- AST JSON card -->
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--green)"></span>AST Output</div>
      <div id="json-out"><span class="empty">Parse a condition to see the AST…</span></div>
    </div>

    <!-- Operator Classifier card -->
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--accent2)"></span>Operator Classifier</div>
      <div class="op-row">
        <input id="op-input" type="text" placeholder="e.g. lower than, at least, not equal…" />
        <button class="btn btn-primary" onclick="runOperator()" style="white-space:nowrap">Classify</button>
      </div>
      <div id="op-result">
        <div class="pred-label">Canonical operator</div>
        <div class="pred-value" id="pred-value">—</div>
        <div class="conf-bar-wrap"><div class="conf-bar" id="conf-bar" style="width:0%"></div></div>
        <div class="conf-pct" id="conf-pct">—</div>
      </div>
      <div id="op-error" style="display:none;color:#fca5a5;font-size:.8rem;margin-top:8px"></div>

      <!-- Autocomplete -->
      <div style="margin-top:20px">
        <div class="card-title" style="margin-bottom:10px"><span class="dot" style="background:var(--amber)"></span>Field Autocomplete</div>
        <div class="op-row">
          <input id="ac-input" type="text" class="btn-ghost"
            style="flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.87rem;outline:none;transition:border-color .2s"
            placeholder="Type a field name prefix…"
            oninput="runAutocomplete()" />
        </div>
        <div id="ac-box"></div>
      </div>
    </div>

  </div><!-- /grid -->
</div><!-- /app -->

<script>
// ── Helpers ────────────────────────────────────────────────────────
function escHTML(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function syntaxJSON(obj) {
  return JSON.stringify(obj, null, 2)
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, m => {
      if (/^"/.test(m)) {
        if (/:$/.test(m)) return `<span class="j-key">${escHTML(m)}</span>`;
        return `<span class="j-str">${escHTML(m)}</span>`;
      }
      if (/true|false/.test(m)) return `<span class="j-bool">${m}</span>`;
      if (/null/.test(m))       return `<span class="j-null">${m}</span>`;
      return `<span class="j-num">${m}</span>`;
    });
}

function astDepth(node) {
  if (!node || typeof node !== 'object') return 0;
  if (node.field !== undefined) return 1;
  const children = [...(node.rules||[]), ...(node.groups||[])];
  return 1 + Math.max(0, ...children.map(astDepth));
}

function showError(msg) {
  const bar = document.getElementById('error-bar');
  bar.textContent = '⚠  ' + msg;
  bar.style.display = 'block';
}
function clearError() {
  document.getElementById('error-bar').style.display = 'none';
}

// ── Parse ──────────────────────────────────────────────────────────
async function runParse() {
  clearError();
  const text = document.getElementById('cond').value.trim();
  if (!text) { showError('Please enter a condition.'); return; }

  const btn = document.getElementById('parse-btn');
  btn.textContent = 'Parsing…'; btn.disabled = true;

  try {
    const res  = await fetch('/api/parse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();

    if (!data.success) {
      showError(data.error || 'Unknown error');
      document.getElementById('token-strip').innerHTML = '<span class="empty">Parse failed.</span>';
      document.getElementById('json-out').innerHTML   = '<span class="empty">No output.</span>';
      return;
    }

    // Token strip
    renderTokens(data.data.tokens || []);

    // AST JSON
    const jOut = document.getElementById('json-out');
    jOut.innerHTML = syntaxJSON(data.data.json);
    jOut.classList.remove('animate-in'); void jOut.offsetWidth;
    jOut.classList.add('animate-in');

    // Stats
    const depth = astDepth(data.data.json);
    document.getElementById('stat-tokens').textContent = (data.data.tokens||[]).length;
    document.getElementById('stat-depth').textContent  = depth;
    document.getElementById('stats').style.display = 'flex';

  } catch(e) {
    showError('Network error: ' + e.message);
  } finally {
    btn.textContent = 'Parse →'; btn.disabled = false;
  }
}

function renderTokens(tokens) {
  const strip = document.getElementById('token-strip');
  if (!tokens.length) {
    strip.innerHTML = '<span class="empty">No tokens.</span>';
    return;
  }
  strip.innerHTML = tokens.map(t => {
    const cls = 'chip chip-' + t.type;
    return `<div class="${cls}" title="pos: ${t.position}">
      <span class="chip-label">${escHTML(t.type)}</span>
      ${escHTML(t.value)}
    </div>`;
  }).join('');
  strip.classList.remove('animate-in'); void strip.offsetWidth;
  strip.classList.add('animate-in');
}

// ── Operator Classifier ────────────────────────────────────────────
async function runOperator() {
  const phrase = document.getElementById('op-input').value.trim();
  const errEl  = document.getElementById('op-error');
  errEl.style.display = 'none';

  if (!phrase) return;

  try {
    const res  = await fetch('/api/operator', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: phrase })
    });

    if (res.status === 503) {
      errEl.textContent = 'Model not loaded — run ML/train.py first.';
      errEl.style.display = 'block'; return;
    }

    const data = await res.json();
    if (data.error) {
      errEl.textContent = data.error; errEl.style.display = 'block'; return;
    }

    const pct = Math.round((data.confidence || 0) * 100);
    document.getElementById('pred-value').textContent = data.prediction || '—';
    document.getElementById('conf-bar').style.width   = pct + '%';
    document.getElementById('conf-pct').textContent   = `Confidence: ${pct}%`;
    const result = document.getElementById('op-result');
    result.style.display = 'block';
    result.classList.remove('animate-in'); void result.offsetWidth;
    result.classList.add('animate-in');

  } catch(e) {
    errEl.textContent = 'Network error: ' + e.message;
    errEl.style.display = 'block';
  }
}

// Enter key triggers classify
document.getElementById('op-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') runOperator();
});

// ── Autocomplete ───────────────────────────────────────────────────
async function runAutocomplete() {
  const q    = document.getElementById('ac-input').value;
  const box  = document.getElementById('ac-box');
  if (!q) { box.style.display = 'none'; box.innerHTML = ''; return; }

  try {
    const res  = await fetch(`/api/autocomplete?q=${encodeURIComponent(q)}&k=8`);
    const data = await res.json();
    const results = data.results || [];
    if (!results.length) { box.style.display = 'none'; return; }
    box.style.display = 'flex';
    box.innerHTML = results.map(r =>
      `<span class="ac-tag" onclick="insertField('${escHTML(r)}')">${escHTML(r)}</span>`
    ).join('');
  } catch(e) { /* silent */ }
}

function insertField(val) {
  const ta = document.getElementById('cond');
  const start = ta.selectionStart, end = ta.selectionEnd;
  ta.value = ta.value.slice(0, start) + val + ta.value.slice(end);
  ta.focus();
}

// ── Clear ──────────────────────────────────────────────────────────
function clearAll() {
  document.getElementById('cond').value = '';
  clearError();
  document.getElementById('token-strip').innerHTML = '<span class="empty">Tokens will appear here after parsing…</span>';
  document.getElementById('json-out').innerHTML    = '<span class="empty">Parse a condition to see the AST…</span>';
  document.getElementById('stats').style.display   = 'none';
  document.getElementById('op-result').style.display = 'none';
  document.getElementById('ac-box').innerHTML = '';
  document.getElementById('ac-input').value   = '';
}

// ── Enter to parse ─────────────────────────────────────────────────
document.getElementById('cond').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) runParse();
});
</script>
</body>
</html>
